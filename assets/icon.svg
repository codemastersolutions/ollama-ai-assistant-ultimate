<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGradient)" stroke="#2d3748" stroke-width="2"/>

  <!-- Robot head -->
  <rect x="32" y="28" width="64" height="48" rx="8" fill="url(#robotGradient)" stroke="#ffffff" stroke-width="2"/>

  <!-- Eyes -->
  <circle cx="48" cy="48" r="6" fill="#ffffff"/>
  <circle cx="80" cy="48" r="6" fill="#ffffff"/>
  <circle cx="48" cy="48" r="3" fill="#2d3748"/>
  <circle cx="80" cy="48" r="3" fill="#2d3748"/>

  <!-- Mouth/speaker -->
  <rect x="40" y="58" width="48" height="8" rx="4" fill="#ffffff"/>
  <rect x="44" y="60" width="4" height="4" rx="1" fill="#2d3748"/>
  <rect x="52" y="60" width="4" height="4" rx="1" fill="#2d3748"/>
  <rect x="60" y="60" width="4" height="4" rx="1" fill="#2d3748"/>
  <rect x="68" y="60" width="4" height="4" rx="1" fill="#2d3748"/>
  <rect x="76" y="60" width="4" height="4" rx="1" fill="#2d3748"/>

  <!-- Body -->
  <rect x="36" y="76" width="56" height="32" rx="6" fill="url(#robotGradient)" stroke="#ffffff" stroke-width="2"/>

  <!-- Chest panel -->
  <rect x="44" y="84" width="40" height="16" rx="3" fill="#ffffff" opacity="0.8"/>

  <!-- Agent indicators (small circles) -->
  <circle cx="50" cy="88" r="2" fill="#10b981"/>
  <circle cx="58" cy="88" r="2" fill="#3b82f6"/>
  <circle cx="66" cy="88" r="2" fill="#f59e0b"/>
  <circle cx="74" cy="88" r="2" fill="#ef4444"/>

  <!-- Arms -->
  <rect x="20" y="80" width="16" height="12" rx="6" fill="url(#robotGradient)" stroke="#ffffff" stroke-width="1"/>
  <rect x="92" y="80" width="16" height="12" rx="6" fill="url(#robotGradient)" stroke="#ffffff" stroke-width="1"/>

  <!-- AI symbol in corner -->
  <text x="100" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">AI</text>
</svg>